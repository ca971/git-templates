# ╔══════════════════════════════════════════════════════════════╗
# ║  .githooks.conf — git-templates repo                         ║
# ║                                                              ║
# ║  Dogfooding: this repo enforces its own hooks strictly.      ║
# ║  Only Shell and Markdown checks are relevant here.           ║
# ╚══════════════════════════════════════════════════════════════╝

# Why this choice
#
# Decision                              Reason
# ──────────────────────────────────────────────────────────────────
# 
# strict_warnings = true                Repo vitrine — commits impeccables
#                                       Dogfooding de notre propre feature
# 
# debug_markers_block = true            Pas de TODO/FIXME oubliés dans
#                                       des scripts qui partent chez les users
# 
# trailing_ws_block = true              Scripts shell sensibles aux whitespace
#                                       Markdown cassé par trailing spaces
# 
# max_file_size = 1048576 (1MB)         Ce repo ne devrait contenir QUE
#                                       du texte — 1MB = déjà suspect
# 
# disable = [14 langages]               Pas de Lua/Python/JS/Go/Rust ici
#                                       → zéro bruit, checks instantanés
# 
# shellcheck ACTIVÉ                     C'est LE checker critique pour ce repo
#                                       Ces scripts tournent chez les users
# 
# markdownlint ACTIVÉ                   README + docs = la vitrine du projet
# 
# run_tests = true                      ShellCheck sur tout avant chaque push
# test_command = shellcheck ...         = notre "test suite"
# 
# protected_branches = main             Pas de staging/production ici
#                                       Juste main à protéger
# 
# allow_wip = false                     Repo public — pas de WIP qui fuite


# ── Global ────────────────────────────────────────────────────
[global]
# skip_all = false

# ── Commit message ────────────────────────────────────────────
# Strict mode: this is a reference project, commit hygiene matters
[commit-msg]
subject_max_length = 72
body_max_length = 100
strict_warnings = true

# ── Pre-commit ────────────────────────────────────────────────
# Shell + Markdown only — disable everything else
# Strict on quality since this is a published developer tool
[pre-commit]
max_file_size = 1048576
debug_markers_block = true
trailing_ws_block = true
enable = shellcheck,markdownlint

# ── Pre-push ─────────────────────────────────────────────────
# ShellCheck is critical here — these scripts ship to users
# Markdown lint ensures docs quality
[pre-push]
protected_branches = main
allow_wip = false
run_tests = true
test_command = shellcheck -S warning hooks/* install.sh
enable = shellcheck,markdownlint

# ── Post-merge ────────────────────────────────────────────────
[post-merge]
show_stat = true
max_files_shown = 15#
